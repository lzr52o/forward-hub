name = "forward-hub"
main = "src/index.js"
compatibility_date = "2024-01-01"

# 上传大小限制（你选择的 5MB）
limits = { max_upload_size = 5 }

# KV 存储（用于存放模块文件）
[[kv_namespaces]]
binding = "MODULES_KV"
id = "modules_kv"
preview_id = "modules_kv_preview"

# D1 数据库（用于存放模块元数据）
[[d1_databases]]
binding = "DB"
database_name = "forward_hub_db"
database_id = "7bc60b52-de53-4531-9cfd-00fcea27aae8"
