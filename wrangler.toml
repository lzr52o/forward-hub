name = "forward-hub"
main = "dist/index.js"
compatibility_date = "2026-03-22"
compatibility_flags = ["nodejs_compat"]

# KV Namespace
[[kv_namespaces]]
binding = "KV"
id = "your_kv_namespace_id"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "forward-hub-db"
database_id = "your_d1_database_id"

# Environment variables
[vars]
ENVIRONMENT = "production"
